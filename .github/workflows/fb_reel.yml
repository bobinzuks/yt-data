name: Facebook Reel Extractor

on:
  push:
    paths:
      - 'fb_target.txt'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Extract reel
        run: |
          URL=$(cat fb_target.txt)
          echo "Extracting: $URL"
          yt-dlp --dump-json --no-playlist "$URL" > output/fb_reel_raw.json 2>output/fb_reel_error.txt || true
          yt-dlp --get-title --get-description --no-playlist "$URL" > output/fb_reel_meta.txt 2>>output/fb_reel_error.txt || true
          yt-dlp -x --audio-format mp3 -o output/fb_reel_audio.mp3 --no-playlist "$URL" 2>>output/fb_reel_error.txt || true
          echo "=== META ===" && cat output/fb_reel_meta.txt || true
          echo "=== ERRORS ===" && cat output/fb_reel_error.txt || true

      - name: Commit results
        run: |
          git config user.name "actions-bot"
          git config user.email "actions@github.com"
          git add output/
          git diff --staged --quiet || (git commit -m "fb reel results" && git push)
