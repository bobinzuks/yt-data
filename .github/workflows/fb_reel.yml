name: Facebook Reel Extractor

on:
  workflow_dispatch:
    inputs:
      reel_url:
        description: 'Facebook reel URL'
        required: true
        default: 'https://www.facebook.com/share/r/17rrQsY9XG/'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Extract reel metadata
        run: |
          URL="${{ github.event.inputs.reel_url }}"
          echo "Extracting: $URL"
          yt-dlp \
            --dump-json \
            --no-playlist \
            "$URL" > output/fb_reel_raw.json 2>output/fb_reel_error.txt || true

          # Also get just title/description
          yt-dlp \
            --get-title \
            --get-description \
            --no-playlist \
            "$URL" > output/fb_reel_meta.txt 2>>output/fb_reel_error.txt || true

          cat output/fb_reel_error.txt
          cat output/fb_reel_meta.txt || true

      - name: Try download audio for transcription
        run: |
          URL="${{ github.event.inputs.reel_url }}"
          yt-dlp \
            -x --audio-format mp3 \
            -o output/fb_reel_audio.mp3 \
            --no-playlist \
            "$URL" 2>>output/fb_reel_error.txt || echo "audio download failed"

      - name: Commit results
        run: |
          git config user.name "actions-bot"
          git config user.email "actions@github.com"
          git add output/
          git diff --staged --quiet || git commit -m "fb reel extraction results" && git push
