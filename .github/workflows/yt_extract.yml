name: YouTube Extractor

on:
  push:
    paths:
      - 'target.txt'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yt-dlp

      - name: Extract all videos (flat + fast)
        run: |
          TARGET=$(cat target.txt | tr -d '\r\n')
          echo "Target: $TARGET"
          mkdir -p output

          python3 << 'PYEOF'
import yt_dlp, json, sys

target = open("target.txt").read().strip()
if target.startswith("@"):
    url = f"https://www.youtube.com/{target}/videos"
elif not target.startswith("http"):
    url = f"https://www.youtube.com/@{target}/videos"
else:
    url = target

print(f"Extracting all videos from: {url}", flush=True)

ydl_opts = {
    "quiet": False,
    "no_warnings": True,
    "extract_flat": "in_playlist",
    "ignoreerrors": True,
    "extractor_args": {"youtubetab": {"skip": ["authcheck"]}},
}

with yt_dlp.YoutubeDL(ydl_opts) as ydl:
    info = ydl.extract_info(url, download=False)

entries = info.get("entries") or []
channel = info.get("channel") or info.get("uploader") or target

def dur(s):
    if not s: return None
    m, sec = divmod(int(s), 60); h, m = divmod(m, 60)
    return f"{h}:{m:02d}:{sec:02d}" if h else f"{m}:{sec:02d}"

videos = []
for e in entries:
    if not e or not e.get("id"):
        continue
    videos.append({
        "id":          e.get("id"),
        "url":         f"https://www.youtube.com/watch?v={e.get('id')}",
        "title":       e.get("title"),
        "published":   e.get("upload_date") or e.get("timestamp"),
        "duration":    dur(e.get("duration")),
        "duration_s":  e.get("duration"),
        "views":       e.get("view_count"),
        "description": e.get("description") or "",
        "thumbnail":   e.get("thumbnail"),
        "channel":     channel,
    })

result = {"channel": channel, "url": url, "count": len(videos), "videos": videos}
with open("output/result_full.json", "w") as f:
    json.dump(result, f, indent=2, ensure_ascii=False)

print(f"\nDone: {len(videos)} videos from '{channel}'")
total_s = sum(v.get("duration_s") or 0 for v in videos)
h, rem = divmod(total_s, 3600); m, s = divmod(rem, 60)
print(f"Total runtime: {h}h {m}m {s}s")
print(f"\nAll videos:")
for v in videos:
    print(f"  [{str(v.get('duration','?')):>7}]  {str(v.get('views') or '?'):>6} views  {v['title']}")
PYEOF

      - name: Commit
        run: |
          git config user.name  "actions-bot"
          git config user.email "actions@github.com"
          git add output/
          git diff --staged --quiet || (git commit -m "full extract: $(wc -l < output/result_full.json) lines" && git push)
