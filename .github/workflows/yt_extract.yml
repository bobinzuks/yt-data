name: YouTube Extractor

on:
  push:
  workflow_dispatch:
    inputs:
      target:
        description: 'Channel @handle or video URL'
        required: false
        default: '@vinnystvincent9788'
      limit:
        description: 'Max videos'
        required: false
        default: '50'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install yt-dlp scrapetube

      - name: Set target
        id: params
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(head -1 target.txt | tr -d '\r\n')
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Using target: $TARGET"

      - name: Extract
        run: |
          mkdir -p output
          python3 scripts/yt_extract.py \
            channel \
            "${{ steps.params.outputs.target }}" \
            --limit 50 \
            --sort popular \
            --out output/result.json

      - name: Preview
        run: |
          python3 - << 'EOF'
          import json
          d = json.load(open("output/result.json"))
          print(f"Got {d['count']} videos")
          for v in d['videos'][:15]:
              print(f"  [{v.get('duration','?'):>7}] {v.get('views','?'):>12}  {v['title']}")
          EOF

      - name: Commit results
        run: |
          git config user.name  "actions-bot"
          git config user.email "actions@github.com"
          git add output/
          git diff --staged --quiet || git commit -m "results: ${{ steps.params.outputs.target }}"
          git push
