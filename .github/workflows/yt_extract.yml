name: YouTube Extractor

on:
  push:
  workflow_dispatch:
    inputs:
      target:
        description: 'Channel @handle or video URL'
        required: false
        default: '@vinnystvincent9788'
      limit:
        description: 'Max videos'
        required: false
        default: '50'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yt-dlp scrapetube
      - name: Extract
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ -z "$TARGET" ]; then TARGET=$(cat target.txt | head -1 | tr -d '\n'); fi
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then LIMIT=50; fi
          mkdir -p output
          python3 scripts/yt_extract.py channel "$TARGET" --limit $LIMIT --sort popular \
            --out "output/result.json"
          python3 -c "
          import json
          d = json.load(open('output/result.json'))
          print(f\"Got {d['count']} videos\")
          for v in d['videos'][:10]:
              print(f\"  {v['title']}\")
          "
      - name: Commit
        run: |
          git config user.name  "actions-bot"
          git config user.email "actions@github.com"
          git add output/
          git diff --staged --quiet || (git commit -m "results: $(cat target.txt | head -1)" && git push)
