name: YouTube Extractor

on:
  push:
    paths:
      - 'target.txt'
  workflow_dispatch:
    inputs:
      target:
        description: 'Channel @handle'
        required: false
        default: '@vinnystvincent9788'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install yt-dlp -q

      - name: Extract ALL videos (no limit)
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ -z "$TARGET" ]; then TARGET=$(head -1 target.txt | tr -d '\r\n# '); fi
          echo "Target: $TARGET"
          mkdir -p output

          python3 << PYEOF
          import yt_dlp, json, sys, os

          target = "$TARGET"
          url = f"https://www.youtube.com/{target}/videos" if target.startswith("@") else target
          print(f"Full extract from: {url}", flush=True)

          def dur(s):
              if not s: return None
              m,sec=divmod(int(s),60); h,m=divmod(m,60)
              return f"{h}:{m:02d}:{sec:02d}" if h else f"{m}:{sec:02d}"

          ydl_opts = {
              "quiet": False,
              "no_warnings": True,
              "extract_flat": "in_playlist",
              "ignoreerrors": True,
              "playlistend": None,
          }

          with yt_dlp.YoutubeDL(ydl_opts) as ydl:
              info = ydl.extract_info(url, download=False)

          entries = [e for e in (info.get("entries") or []) if e and e.get("id")]
          channel = info.get("channel") or info.get("uploader") or target
          print(f"\nGot {len(entries)} videos — Channel: {channel}", flush=True)

          videos = []
          for e in entries:
              videos.append({
                  "id":         e.get("id"),
                  "url":        f"https://www.youtube.com/watch?v={e.get('id')}",
                  "title":      e.get("title"),
                  "published":  e.get("upload_date") or str(e.get("timestamp",""))[:10],
                  "duration":   dur(e.get("duration")),
                  "duration_s": e.get("duration"),
                  "views":      e.get("view_count"),
                  "description": (e.get("description") or "")[:500],
                  "thumbnail":  e.get("thumbnail"),
              })
              print(f"  [{len(videos):3}] [{dur(e.get('duration')) or '?':>7}] {str(e.get('view_count') or '?'):>8} views  {e.get('title','?')}", flush=True)

          result = {"channel": channel, "url": url, "count": len(videos), "videos": videos}
          with open("output/result_full.json","w") as f:
              json.dump(result, f, indent=2, ensure_ascii=False)

          total_s = sum(v.get("duration_s") or 0 for v in videos)
          h,rem=divmod(total_s,3600); m,s=divmod(rem,60)
          print(f"\nDONE: {len(videos)} videos | {h}h {m}m total runtime")
          PYEOF

      - name: Commit result
        run: |
          git config user.name  "actions-bot"
          git config user.email "actions@github.com"
          git add output/result_full.json
          git diff --staged --quiet || (git commit -m "full extract: $(python3 -c \"import json;d=json.load(open('output/result_full.json'));print(d['count'])\")" && git push)
