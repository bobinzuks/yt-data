name: YouTube Extractor

on:
  push:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract all videos (InnerTube API)
        run: python3 scripts/extract.py

      - name: Commit results
        run: |
          COUNT=$(python3 -c "import json; print(json.load(open('output/result_full.json'))['count'])")
          echo "Got $COUNT videos"
          git config user.name  "actions-bot"
          git config user.email "actions@github.com"
          git add output/result_full.json
          git diff --staged --quiet || (git commit -m "results: ${COUNT} videos" && git push)
