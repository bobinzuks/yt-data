name: YouTube Extractor

on:
  push:
    paths:
      - 'target.txt'
  workflow_dispatch:
    inputs:
      target:
        description: 'Channel @handle, video URL, or search query'
        required: false
        default: '@vinnystvincent9788'
      mode:
        description: 'channel | video | search'
        required: false
        default: 'channel'
      limit:
        description: 'Max results'
        required: false
        default: '50'
      sort:
        description: 'newest | oldest | popular'
        required: false
        default: 'popular'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install yt-dlp scrapetube

      - name: Run extractor
        run: |
          # Read from inputs or target.txt
          TARGET="${{ github.event.inputs.target }}"
          MODE="${{ github.event.inputs.mode }}"
          LIMIT="${{ github.event.inputs.limit }}"
          SORT="${{ github.event.inputs.sort }}"

          if [ -z "$TARGET" ]; then TARGET=$(cat target.txt); fi
          if [ -z "$MODE" ];   then MODE="channel"; fi
          if [ -z "$LIMIT" ];  then LIMIT="50"; fi
          if [ -z "$SORT" ];   then SORT="popular"; fi

          echo "Mode:   $MODE"
          echo "Target: $TARGET"
          echo "Limit:  $LIMIT"
          echo "Sort:   $SORT"

          mkdir -p output
          python3 scripts/yt_extract.py \
            $MODE "$TARGET" \
            --limit $LIMIT \
            --sort $SORT \
            --out output/result.json

      - name: Preview results
        run: |
          python3 - << 'PYEOF'
          import json
          d = json.load(open("output/result.json"))
          items = d.get("videos") or d.get("results") or []
          print(f"\n=== {d.get('channel_url', d.get('query',''))} ===")
          print(f"Total: {len(items)}")
          for v in items[:20]:
              print(f"  [{v.get('duration','?'):>7}] {v.get('views','?'):>12}  {v.get('title','?')}")
          PYEOF

      - name: Commit results
        run: |
          git config user.name  "actions-bot"
          git config user.email "actions@github.com"
          git add output/
          git status
          git diff --staged --quiet || git commit -m "results: ${{ github.event.inputs.target || 'push trigger' }}" && git push
