name: YouTube Extractor

on:
  push:
    paths:
      - 'target.txt'
  workflow_dispatch:
    inputs:
      target:
        description: 'Channel @handle, video URL, or search query'
        required: false
        default: '@vinnystvincent9788'
      mode:
        description: 'channel | video | search'
        required: false
        default: 'channel'
      limit:
        description: 'Max results'
        required: false
        default: '50'

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install yt-dlp

      - name: Extract
        run: |
          TARGET="${{ github.event.inputs.target }}"
          MODE="${{ github.event.inputs.mode }}"
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$TARGET" ]; then TARGET=$(cat target.txt); fi
          if [ -z "$MODE" ];   then MODE="channel"; fi
          if [ -z "$LIMIT" ];  then LIMIT="50"; fi
          echo "Target: $TARGET | Mode: $MODE | Limit: $LIMIT"
          mkdir -p output
          python3 scripts/yt_extract.py \
            $MODE "$TARGET" \
            --limit $LIMIT \
            --out output/result.json

      - name: Preview
        run: |
          python3 - << 'PYEOF'
          import json
          d = json.load(open("output/result.json"))
          items = d.get("videos") or d.get("results") or []
          print(f"Channel: {d.get('channel','?')}  |  Total: {len(items)}")
          for v in items[:20]:
              print(f"  [{str(v.get('duration','?')):>7}] {str(v.get('views','?')):>10}  {v.get('title','?')}")
          PYEOF

      - name: Commit
        run: |
          git config user.name  "actions-bot"
          git config user.email "actions@github.com"
          git add output/
          git diff --staged --quiet || (git commit -m "results: ${{ github.event.inputs.target || 'push' }}" && git push)
