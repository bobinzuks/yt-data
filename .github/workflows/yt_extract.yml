name: YouTube Extractor

on:
  push:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check YouTube connectivity
        run: |
          curl -s -o /dev/null -w "youtube.com: %{http_code}\n" "https://www.youtube.com/" || true
          curl -s -o /dev/null -w "innertube: %{http_code}\n" -X POST "https://www.youtube.com/youtubei/v1/browse" || true

      - name: Extract all videos (InnerTube API - no yt-dlp)
        run: python3 scripts/extract.py

      - name: Show results
        run: |
          python3 -c "
          import json
          d = json.load(open('output/result_full.json'))
          print(f\"Channel: {d['channel']}  |  Videos: {d['count']}\")
          for v in d['videos'][:20]:
              print(f\"  [{v.get('duration','?'):>7}]  {v.get('views','?'):>12}  {v['title']}\")
          "

      - name: Commit results
        run: |
          git config user.name  "actions-bot"
          git config user.email "actions@github.com"
          git add output/result_full.json
          git diff --staged --quiet || (git commit -m "results: $(python3 -c \"import json;print(json.load(open('output/result_full.json'))['count'])\" ) videos" && git push)
