name: YouTube Extractor

on:
  push:
    paths:
      - 'target.txt'
  workflow_dispatch:
    inputs:
      target:
        description: 'Channel @handle'
        required: false
        default: '@vinnystvincent9788'

jobs:
  # Job 1: Get total video count + split into chunks
  prepare:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.split.outputs.chunks }}
      total:  ${{ steps.split.outputs.total }}
      channel: ${{ steps.split.outputs.channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install yt-dlp -q

      - name: Get all video IDs
        id: split
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [ -z "$TARGET" ]; then TARGET=$(head -1 target.txt | tr -d '\r\n'); fi
          echo "Target: $TARGET"

          python3 << PYEOF
          import yt_dlp, json, math

          target = "$TARGET"
          url = f"https://www.youtube.com/{target}/videos" if target.startswith("@") else target

          print(f"Getting video list from: {url}", flush=True)
          with yt_dlp.YoutubeDL({"quiet":True,"no_warnings":True,"extract_flat":"in_playlist","ignoreerrors":True}) as ydl:
              info = ydl.extract_info(url, download=False)

          entries = [e for e in (info.get("entries") or []) if e and e.get("id")]
          channel = info.get("channel") or info.get("uploader") or target
          total = len(entries)
          print(f"Total videos: {total}  Channel: {channel}", flush=True)

          # Split into 4 chunks for parallel runners
          n = 4
          chunk_size = math.ceil(total / n)
          chunks = []
          for i in range(n):
              start = i * chunk_size
              end = min(start + chunk_size, total)
              if start < total:
                  chunk_ids = [e["id"] for e in entries[start:end]]
                  chunks.append({"index": i, "ids": chunk_ids, "start": start, "end": end})

          # Save full ID list
          import os
          os.makedirs("output", exist_ok=True)
          with open("output/all_ids.json", "w") as f:
              json.dump({"channel": channel, "total": total, "entries": entries, "chunks": chunks}, f)

          # Set outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"total={total}\n")
              f.write(f"channel={channel}\n")
              f.write(f"chunks={json.dumps(chunks)}\n")
          PYEOF

      - name: Commit ID list
        run: |
          git config user.name "actions-bot"
          git config user.email "actions@github.com"
          git add output/
          git diff --staged --quiet || (git commit -m "extract: video IDs for ${{ github.event.inputs.target || 'target' }}" && git push)

  # Job 2: Parallel deep extract across 4 runners (4 different IPs)
  extract:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: ${{ fromJson(needs.prepare.outputs.chunks) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install yt-dlp -q

      - name: Extract chunk ${{ matrix.chunk.index }}
        run: |
          python3 << PYEOF
          import yt_dlp, json, os, time

          chunk = ${{ toJson(matrix.chunk) }}
          ids = chunk["ids"]
          idx = chunk["index"]
          print(f"Runner {idx}: extracting {len(ids)} videos ({chunk['start']}-{chunk['end']})", flush=True)

          def dur(s):
              if not s: return None
              m,sec=divmod(int(s),60); h,m=divmod(m,60)
              return f"{h}:{m:02d}:{sec:02d}" if h else f"{m}:{sec:02d}"

          results = []
          for i, vid_id in enumerate(ids):
              url = f"https://www.youtube.com/watch?v={vid_id}"
              try:
                  with yt_dlp.YoutubeDL({"quiet":True,"no_warnings":True,"skip_download":True,"ignoreerrors":True}) as ydl:
                      v = ydl.extract_info(url, download=False)
                  if not v: continue
                  results.append({
                      "id": v.get("id"), "url": url,
                      "title": v.get("title"),
                      "published": v.get("upload_date"),
                      "duration": dur(v.get("duration")),
                      "duration_s": v.get("duration"),
                      "views": v.get("view_count"),
                      "likes": v.get("like_count"),
                      "description": v.get("description") or "",
                      "tags": v.get("tags") or [],
                      "chapters": v.get("chapters") or [],
                      "thumbnail": v.get("thumbnail"),
                  })
                  print(f"  [{i+1}/{len(ids)}] {results[-1]['duration'] or '?':>7}  {v.get('title','?')}", flush=True)
              except Exception as e:
                  print(f"  [{i+1}] ERROR {vid_id}: {e}", flush=True)
              time.sleep(0.3)  # gentle rate limiting

          os.makedirs("output", exist_ok=True)
          with open(f"output/chunk_{idx}.json", "w") as f:
              json.dump({"chunk": idx, "count": len(results), "videos": results}, f, indent=2, ensure_ascii=False)
          print(f"Saved {len(results)} videos to output/chunk_{idx}.json")
          PYEOF

      - name: Commit chunk
        run: |
          git config user.name "actions-bot"
          git config user.email "actions@github.com"
          git pull --rebase origin main
          git add output/chunk_${{ matrix.chunk.index }}.json
          git diff --staged --quiet || (git commit -m "chunk ${{ matrix.chunk.index }}: ${{ matrix.chunk.start }}-${{ matrix.chunk.end }}" && git push)

  # Job 3: Merge all chunks into final result
  merge:
    needs: extract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - run: git pull origin main

      - name: Merge chunks
        run: |
          python3 << 'PYEOF'
          import json, glob, os

          chunks = sorted(glob.glob("output/chunk_*.json"))
          all_videos = []
          for f in chunks:
              d = json.load(open(f))
              all_videos.extend(d["videos"])
              print(f"  {f}: {d['count']} videos")

          ids_data = json.load(open("output/all_ids.json"))
          result = {
              "channel": ids_data["channel"],
              "count": len(all_videos),
              "videos": all_videos
          }
          with open("output/result_full.json", "w") as f:
              json.dump(result, f, indent=2, ensure_ascii=False)

          total_s = sum(v.get("duration_s") or 0 for v in all_videos)
          h,rem=divmod(total_s,3600); m,s=divmod(rem,60)
          print(f"\nMerged {len(all_videos)} videos — total runtime {h}h {m}m")
          print(f"\nTop 20 by views:")
          for v in sorted(all_videos, key=lambda x: x.get("views") or 0, reverse=True)[:20]:
              print(f"  {v.get('views') or 0:>6} views  [{v.get('duration','?'):>7}]  {v['title']}")
          PYEOF

      - name: Commit final result
        run: |
          git config user.name "actions-bot"
          git config user.email "actions@github.com"
          git add output/result_full.json
          git diff --staged --quiet || (git commit -m "DONE: full extract complete" && git push)
