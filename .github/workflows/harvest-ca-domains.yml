name: Harvest .ca Domains (CDX Shards)

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "Batch 1=0-59, 2=60-119, 3=120-179, 4=180-239, 5=240-299"
        default: "1"
        type: choice
        options: ["1","2","3","4","5"]

permissions:
  contents: write

jobs:
  harvest:
    name: "Shards ${{ matrix.start }}-${{ matrix.end }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - {start: 0, end: 2}
          - {start: 3, end: 5}
          - {start: 6, end: 8}
          - {start: 9, end: 11}
          - {start: 12, end: 14}
          - {start: 15, end: 17}
          - {start: 18, end: 20}
          - {start: 21, end: 23}
          - {start: 24, end: 26}
          - {start: 27, end: 29}
          - {start: 30, end: 32}
          - {start: 33, end: 35}
          - {start: 36, end: 38}
          - {start: 39, end: 41}
          - {start: 42, end: 44}
          - {start: 45, end: 47}
          - {start: 48, end: 50}
          - {start: 51, end: 53}
          - {start: 54, end: 56}
          - {start: 57, end: 59}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Stream CDX shards and extract .ca domains
        run: |
          OFFSET=$(( (${{ inputs.batch || '1' }} - 1) * 60 ))
          START=$(( OFFSET + ${{ matrix.start }} ))
          END=$(( OFFSET + ${{ matrix.end }} ))
          
          echo "Processing CDX shards ${START}-${END}"
          mkdir -p results
          
          > results/ca_domains_${START}_${END}.txt
          
          for i in $(seq $START $END); do
            SHARD=$(printf "cdx-%05d.gz" $i)
            URL="https://data.commoncrawl.org/cc-index/collections/CC-MAIN-2026-12/indexes/${SHARD}"
            echo "  Streaming ${SHARD}..."
            
            curl -s --max-time 120 "${URL}" 2>/dev/null | \
              gunzip 2>/dev/null | \
              grep -oP '[a-z0-9][a-z0-9.-]+\.ca(?=[/\s])' | \
              sort -u >> results/ca_domains_${START}_${END}.txt
            
            echo "    $(wc -l < results/ca_domains_${START}_${END}.txt) domains so far"
          done
          
          # Deduplicate
          sort -u results/ca_domains_${START}_${END}.txt -o results/ca_domains_${START}_${END}.txt
          TOTAL=$(wc -l < results/ca_domains_${START}_${END}.txt)
          echo "Done: ${TOTAL} unique .ca domains from shards ${START}-${END}"
        timeout-minutes: 50

      - name: Commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --cached --quiet || git commit -m "harvest: .ca domains from CDX shards"
          for i in 1 2 3 4 5; do git pull --rebase origin main || true; git push origin HEAD:main && break || sleep $((i*2)); done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "ca-shards-${{ matrix.start }}-${{ matrix.end }}"
          path: results/ca_domains_*.txt
          if-no-files-found: ignore
