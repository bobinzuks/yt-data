name: Corp Registry Scan (Stealth)

on:
  workflow_dispatch:
    inputs:
      batch:
        description: "Batch: 1=A-E, 2=F-J, 3=K-O, 4=P-T, 5=U-Z"
        default: "1"
        type: choice
        options: ["1","2","3","4","5"]

permissions:
  contents: write

jobs:
  scan:
    name: "Scan ${{ matrix.letter }}"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        letter: ${{ inputs.batch == '1' && fromJson('["A","B","C","D","E"]') || inputs.batch == '2' && fromJson('["F","G","H","I","J"]') || inputs.batch == '3' && fromJson('["K","L","M","N","O"]') || inputs.batch == '4' && fromJson('["P","Q","R","S","T"]') || fromJson('["U","V","W","X","Y","Z"]') }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests

      - name: Stealth scan
        run: |
          python3 << 'PYEOF'
          import requests, re, csv, time, os, json, random

          BASE = "https://ised-isde.canada.ca/cc/lgcy/fdrlCrpSrch.html"
          L = "${{ matrix.letter }}"
          UAS = [
            "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
            "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_4) AppleWebKit/605.1.15 Version/17.3 Safari/605.1.15",
            "Mozilla/5.0 (X11; Linux x86_64; rv:125.0) Gecko/20100101 Firefox/125.0",
          ]
          s = requests.Session()
          s.headers.update({"Accept":"text/html","Accept-Language":"en-CA,en;q=0.9","Connection":"keep-alive"})
          
          # Get cookies first
          s.headers["User-Agent"] = random.choice(UAS)
          s.get(BASE, timeout=15)
          time.sleep(random.uniform(2,4))

          os.makedirs("results", exist_ok=True)
          corps = []
          
          # Try 2-char prefixes
          for c2 in [chr(c) for c in range(65,91)]:
              prefix = L + c2
              s.headers["User-Agent"] = random.choice(UAS)
              for page in range(10):
                  url = f"{BASE}?p={page}&crpNm={prefix}&crpNmbr=&bsNmbr=&cProv=&cStatus=&cAct="
                  try:
                      r = s.get(url, timeout=15)
                      names = re.findall(r'fdrlCrpDtls\.html[^>]+>([^<]+)', r.text)
                      nums = re.findall(r'Corporation number[:\s]+(\S+)', r.text)
                      if not names: break
                      for i in range(len(names)):
                          corps.append({"name":names[i].strip(),"num":nums[i] if i<len(nums) else "","prefix":prefix})
                      time.sleep(random.uniform(4,9))
                  except:
                      time.sleep(15)
                      break
              if corps and len(corps)%50<20: print(f"  {prefix}: {len(corps)} total")

          with open(f"results/corps_{L}.csv","w",newline="") as f:
              csv.DictWriter(f,["name","num","prefix"]).writeheader()
              csv.DictWriter(f,["name","num","prefix"]).writerows(corps)

          doms = set()
          for c in corps:
              sl = re.sub(r'[^a-z0-9]','',c['name'].lower().replace(' ','').replace('inc','').replace('ltd',''))
              if 4<=len(sl)<=30: doms.add(sl+".ca"); doms.add(sl+".com")
          open(f"results/domains_{L}.txt","w").write("\n".join(sorted(doms)))
          
          print(f"Letter {L}: {len(corps)} corps, {len(doms)} domains")
          PYEOF

      - name: Commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --cached --quiet || git commit -m "registry: ${{ matrix.letter }}"
          for i in 1 2 3 4 5; do git pull --rebase origin main || true; git push origin HEAD:main && break || sleep $((i*2)); done

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: "corps-${{ matrix.letter }}"
          path: results/
          if-no-files-found: ignore
